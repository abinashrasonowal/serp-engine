services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: google-shopping-scraper-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APIFY_CONTAINER_PORT=8000
    volumes:
      - ./user_data:/app/user_data
    restart: unless-stopped
